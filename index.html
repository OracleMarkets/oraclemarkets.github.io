            </svg>
            <input id="search-bar" type="search" placeholder="Search markets..." autocomplete="off">
            <kbd class="search-kbd">/</kbd>
        </div>

        <nav class="leaderboard-nav" aria-label="Site navigation">
            <a href="./" class="leaderboard-nav-link active" aria-current="page">Markets</a>
            <a href="lottery/" class="leaderboard-nav-link">Lottery</a>
            <a href="leaderboard/" class="leaderboard-nav-link">Leaderboard</a>
        </nav>

<!--                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>-->

<!--                <span></span><span></span><span></span>-->
<!--            </button>-->
<!--        </div>-->
    </div>

    <nav id="tabs" class="tabs skeleton-tabs" aria-label="Market categories" aria-hidden="true">
        <span class="skeleton-pill skeleton-pill--tab"></span>
        <span class="skeleton-pill skeleton-pill--tab"></span>
        <span class="skeleton-pill skeleton-pill--tab"></span>

<main class="page-enter" id="main-content" aria-busy="true">
    <section class="highlights">
        <article id="featured-card" class="card highlight skeleton-featured" aria-hidden="true">
            <div class="featured-header">
                <div class="skeleton-block skeleton-icon"></div>
                <div class="featured-title-block">
                    <div class="skeleton-line skeleton-line--xs"></div>
                    <div class="skeleton-line skeleton-line--lg"></div>
                </div>
            </div>
            <div class="highlight-body">
                <div class="highlight-left">
                    <div class="skeleton-line skeleton-line--chance"></div>
                    <div class="skeleton-btn-row">
                        <div class="skeleton-block skeleton-btn"></div>
                        <div class="skeleton-block skeleton-btn"></div>
                    </div>
                </div>
                <div class="skeleton-block skeleton-chart"></div>
            </div>
            <div class="skeleton-featured-footer">
                <div class="skeleton-line skeleton-line--footer-meta"></div>
                <div class="skeleton-footer-dots">
                    <span class="skeleton-dot"></span>
                    <span class="skeleton-dot"></span>
                    <span class="skeleton-dot"></span>
                </div>
                <div class="skeleton-line skeleton-line--footer-nav"></div>

        <aside id="sidebars" class="sidebar-stack" aria-hidden="true">
            <div class="sidebar-card skeleton-sidebar">
                <div class="skeleton-line skeleton-line--sidebar-title"></div>
                <div class="skeleton-breaking-item">

                    <div class="skeleton-line skeleton-line--breaking-title"></div>

                    </div>
                </div>
                <div class="skeleton-breaking-item">
                    <div class="skeleton-line skeleton-line--rank"></div>
                    <div class="skeleton-line skeleton-line--breaking-title"></div>
                    <div class="skeleton-breaking-stat">
                        <div class="skeleton-line skeleton-line--stat"></div>
                        <div class="skeleton-line skeleton-line--stat-sm"></div>
                    </div>
                </div>
                <div class="skeleton-breaking-item">
                    <div class="skeleton-line skeleton-line--rank"></div>
                    <div class="skeleton-line skeleton-line--breaking-title"></div>
                    <div class="skeleton-breaking-stat">
                        <div class="skeleton-line skeleton-line--stat"></div>
                        <div class="skeleton-line skeleton-line--stat-sm"></div>
                    </div>
                </div>
            </div>
            <div class="sidebar-card skeleton-sidebar">
                <div class="skeleton-line skeleton-line--sidebar-title"></div>
                <div class="skeleton-hot-item">
                    <div class="skeleton-line skeleton-line--hot-name"></div>
                    <div class="skeleton-line skeleton-line--hot-vol"></div>
                </div>
                <div class="skeleton-hot-item">
                    <div class="skeleton-line skeleton-line--hot-name"></div>
                    <div class="skeleton-line skeleton-line--hot-vol"></div>
                </div>
                <div class="skeleton-hot-item">
                    <div class="skeleton-line skeleton-line--hot-name"></div>
                    <div class="skeleton-line skeleton-line--hot-vol"></div>
                </div>
            </div>
        </aside>
    </section>

    <section class="markets-section">
        <div class="section-header">
            <h2 class="section-title">All markets</h2>
        </div>

        <nav id="grid-tags" class="grid-tags skeleton-grid-tags" aria-label="Market filters" aria-hidden="true">
            <span class="skeleton-pill"></span>
            <span class="skeleton-pill"></span>
            <span class="skeleton-pill"></span>
            <span class="skeleton-pill"></span>
            <span class="skeleton-pill skeleton-pill--short"></span>
        </nav>
        <div id="event-grid" class="event-grid" aria-hidden="true">

            <article class="event-card skeleton-card"><div class="skeleton-card-top"><div class="skeleton-block skeleton-card-icon"></div><div class="skeleton-card-copy"><div class="skeleton-line skeleton-line--card-title"></div><div class="skeleton-line skeleton-line--card-title-sub"></div></div><div class="skeleton-block skeleton-card-arc"></div></div><div class="skeleton-btn-row"><div class="skeleton-block skeleton-btn skeleton-btn--compact"></div><div class="skeleton-block skeleton-btn skeleton-btn--compact"></div></div><div class="skeleton-line skeleton-line--card-meta"></div></article>
            <article class="event-card skeleton-card"><div class="skeleton-card-top"><div class="skeleton-block skeleton-card-icon"></div><div class="skeleton-card-copy"><div class="skeleton-line skeleton-line--card-title"></div><div class="skeleton-line skeleton-line--card-title-sub"></div></div><div class="skeleton-block skeleton-card-arc"></div></div><div class="skeleton-btn-row"><div class="skeleton-block skeleton-btn skeleton-btn--compact"></div><div class="skeleton-block skeleton-btn skeleton-btn--compact"></div></div><div class="skeleton-line skeleton-line--card-meta"></div></article>

        </div>
        <p id="empty-state" class="empty-state" hidden>No markets match your filters.</p>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-row">
            <div class="footer-brand">

                </a>
                <p class="footer-tagline" id="footer-tagline">A prediction market for the Crestconomy civilisation event.</p>
            </div>
            <div class="footer-links" id="footer-links"></div>
        </div>
        <div class="footer-bottom">
            <p class="footer-copy">© 2026 Oracle Prediction Market</p>
            <div class="footer-currency">
                <label class="footer-currency-label" for="currency-select">Currency</label>
                <select id="currency-select" class="footer-currency-select" aria-label="Currency">
                    <option value="bedro" selected>Bedro</option>
